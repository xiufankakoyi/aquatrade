# RSI策略配置
# 基于相对强弱指标(RSI)的超买超卖策略

strategy:
  strategy_id: "rsi_v1"
  name: "RSI超买超卖策略"
  version: "1.0"
  description: "基于RSI指标的超买超卖策略。RSI低于超卖阈值时买入，高于超买阈值时卖出。"
  author: "AquaTrade"
  tags: ["均值回归", "RSI", "震荡策略"]

  # 参数定义
  parameters:
    - name: rsi_period
      type: int
      default: 14
      min: 5
      max: 30
      step: 1
      label: "RSI周期"
      description: "RSI指标的计算周期"
      unit: "天"
    
    - name: oversold_threshold
      type: int
      default: 30
      min: 10
      max: 40
      step: 1
      label: "超卖阈值"
      description: "RSI低于此值视为超卖，产生买入信号"
      unit: ""
    
    - name: overbought_threshold
      type: int
      default: 70
      min: 60
      max: 90
      step: 1
      label: "超买阈值"
      description: "RSI高于此值视为超买，产生卖出信号"
      unit: ""

  # 指标声明
  indicators:
    - name: rsi
      type: rsi
      params:
        column: close
        window: "${rsi_period}"
      description: "RSI相对强弱指标"

  # 交易规则
  rules:
    # 买入规则：RSI超卖
    - action: buy
      condition: "rsi < ${oversold_threshold}"
      position_ratio: 0.1
      max_stocks_per_day: 3
      priority: 10
    
    # 卖出规则：RSI超买
    - action: sell
      condition: "rsi > ${overbought_threshold}"
      priority: 10

  # 风险管理
  risk_management:
    max_positions: 5
    position_ratio: 0.1
    stop_loss: 0.05
    max_holding_days: 10

  # 股票过滤
  filters:
    market_cap_min: 100000  # 10亿
    price_min: 5.0
    exclude_st: true
    min_list_days: 120

  created_at: "2025-02-14T00:00:00"
  updated_at: "2025-02-14T00:00:00"
