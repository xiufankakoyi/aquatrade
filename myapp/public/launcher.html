<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrade - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0B1120 0%, #0F172A 50%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 500px;
            text-align: center;
        }
        
        .logo-container {
            position: relative;
            margin-bottom: 2rem;
        }
        
        .logo-glow {
            position: absolute;
            inset: -30px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        
        .logo {
            position: relative;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #06B6D4 0%, #0891B2 50%, #0E7490 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(6, 182, 212, 0.3);
        }
        
        .logo svg {
            width: 48px;
            height: 48px;
        }
        
        .title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #67E8F9 0%, #22D3EE 50%, #06B6D4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }
        
        .subtitle {
            font-size: 0.75rem;
            color: #64748B;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }
        
        .progress-container {
            width: 100%;
            max-width: 300px;
            margin-bottom: 1rem;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #06B6D4, #22D3EE);
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        .status {
            font-size: 0.875rem;
            color: #94A3B8;
            margin-bottom: 1.5rem;
        }
        
        .dots {
            display: inline-block;
        }
        
        .dots span {
            animation: dots 1.5s infinite;
            opacity: 0;
        }
        
        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.3s; }
        .dots span:nth-child(3) { animation-delay: 0.6s; }
        
        @keyframes dots {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .wave {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(180deg, transparent 60%, rgba(6, 182, 212, 0.03) 100%);
            border-radius: 50% 50% 0 0;
            animation: wave 8s ease-in-out infinite;
        }
        
        .wave:nth-child(2) {
            animation-delay: -2s;
            opacity: 0.5;
        }
        
        .wave:nth-child(3) {
            animation-delay: -4s;
            opacity: 0.3;
        }
        
        @keyframes wave {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(25%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="wave-bg">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>
    
    <div class="splash">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C12 2 8 6 8 10C8 14 12 18 12 18C12 18 16 14 16 10C16 6 12 2 12 2Z" fill="white" opacity="0.9"/>
                    <path d="M6 8C6 8 3 11 3 14C3 17 6 20 6 20C6 20 9 17 9 14C9 11 6 8 6 8Z" fill="white" opacity="0.6"/>
                    <path d="M18 8C18 8 15 11 15 14C15 17 18 20 18 20C18 20 21 17 21 14C21 11 18 8 18 8Z" fill="white" opacity="0.6"/>
                </svg>
            </div>
        </div>
        
        <h1 class="title">AquaTrade</h1>
        <p class="subtitle">Quantitative Platform</p>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
        
        <p class="status">
            <span id="status-text">正在启动服务</span>
            <span class="dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </span>
        </p>
    </div>
    
    <script>
        const VITE_PORT = 5173;
        const BACKEND_PORT = 5000;
        const CHECK_INTERVAL = 200;
        const MAX_WAIT = 30000;
        
        const startTime = Date.now();
        const statusEl = document.getElementById('status-text');
        
        const statusMessages = [
            '正在启动服务',
            '正在加载前端模块',
            '正在连接后端',
            '正在初始化系统'
        ];
        
        let messageIndex = 0;
        setInterval(() => {
            if (Date.now() - startTime < MAX_WAIT) {
                messageIndex = (messageIndex + 1) % statusMessages.length;
                statusEl.textContent = statusMessages[messageIndex];
            }
        }, 1500);
        
        function checkVite() {
            return fetch(`http://localhost:${VITE_PORT}`, { 
                method: 'HEAD',
                mode: 'no-cors'
            }).then(() => true).catch(() => false);
        }
        
        async function waitForVite() {
            while (Date.now() - startTime < MAX_WAIT) {
                try {
                    const ready = await checkVite();
                    if (ready) {
                        statusEl.textContent = '正在跳转';
                        window.location.replace(`http://localhost:${VITE_PORT}/`);
                        return;
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, CHECK_INTERVAL));
            }
            
            statusEl.textContent = '启动超时，请检查服务';
        }
        
        waitForVite();
    </script>
</body>
</html>
