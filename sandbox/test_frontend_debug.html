<!DOCTYPE html>
<html>
<head>
    <title>前端调试</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; }
        .log { margin: 5px 0; padding: 5px; border-left: 3px solid #ccc; }
        .event { background: #f0f0f0; }
        .error { background: #ffcccc; border-color: red; }
        .success { background: #ccffcc; border-color: green; }
    </style>
</head>
<body>
    <h1>前端回测调试</h1>
    <button onclick="startBacktest()">开始回测</button>
    <button onclick="clearLog()">清除日志</button>
    <div id="logs"></div>

    <script>
        const logs = document.getElementById('logs');
        let socket = null;
        let eventCount = 0;

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(div);
            console.log(msg);
        }

        function clearLog() {
            logs.innerHTML = '';
            eventCount = 0;
        }

        function connect() {
            log('连接 Socket.IO...');
            socket = io('http://localhost:5000', {
                transports: ['polling', 'websocket'],
                timeout: 10000
            });

            socket.on('connect', () => {
                log(`✓ 已连接, sid=${socket.id}`, 'success');
            });

            socket.on('disconnect', (reason) => {
                log(`✗ 断开连接: ${reason}`, 'error');
            });

            socket.on('connect_error', (err) => {
                log(`✗ 连接错误: ${err.message}`, 'error');
            });

            // 监听所有回测事件
            const eventTypes = [
                'initializing', 'initialized', 'backtest_start',
                'daily_equity', 'new_trade', 'metrics_update', 'final_metrics',
                'risk_data', 'risk_update', 'stream_complete', 'error', 'cancelled'
            ];

            eventTypes.forEach(type => {
                socket.on(type, (data) => {
                    eventCount++;
                    log(`事件 #${eventCount}: ${type} ${JSON.stringify(data).slice(0, 200)}`, 'event');
                });
            });
        }

        function startBacktest() {
            if (!socket || !socket.connected) {
                log('✗ 未连接，先连接...');
                connect();
                setTimeout(startBacktest, 1000);
                return;
            }

            log('发送回测请求...');
            socket.emit('run_streaming_backtest', {
                strategy_name: '聚宽量比市值策略pro',
                start_date: '2024-05-20',
                end_date: '2024-05-25',
                benchmark_code: '000300'
            });
            log('✓ 回测请求已发送');
        }

        // 自动连接
        connect();
    </script>
</body>
</html>
